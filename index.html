<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datastraw CRM — Support Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:    '#0e0f11',
            panel:  '#161719',
            card:   '#1d1f22',
            border: '#2a2d31',
            muted:  '#4a4e56',
            dim:    '#7a7f8a',
            body:   '#c4c7ce',
            bright: '#eceef2',
            amber:  '#e8a435',
            amberL: '#f5c46e',
            teal:   '#3ec9b0',
            rose:   '#f05a6e',
          },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            mono:    ['DM Mono', 'monospace'],
            sans:    ['DM Sans', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0e0f11;
      color: #c4c7ce;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #161719; }
    ::-webkit-scrollbar-thumb { background: #2a2d31; border-radius: 99px; }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Status pills */
    .pill-open        { background:#1e2d1a; color:#6fcf61; border:1px solid #2e4a28; }
    .pill-in_progress { background:#2a2310; color:#e8a435; border:1px solid #4a3a18; }
    .pill-closed      { background:#1f1f2e; color:#8080c0; border:1px solid #2e2e50; }

    /* Ticket row hover */
    .ticket-row {
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .ticket-row:hover { background: #222428; border-color: #3a3e46 !important; }
    .ticket-row.active { background: #1d2026; border-color: #e8a435 !important; }

    /* Form input focus */
    .field {
      background: #1d1f22;
      border: 1px solid #2a2d31;
      border-radius: 6px;
      color: #eceef2;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      width: 100%;
      padding: 0.55rem 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
    }
    .field::placeholder { color: #4a4e56; }
    .field:focus { border-color: #e8a435; box-shadow: 0 0 0 3px rgba(232,164,53,0.12); }

    textarea.field { resize: vertical; min-height: 84px; }

    /* Primary button */
    .btn-primary {
      background: #e8a435;
      color: #0e0f11;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: #f5c46e; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #4a4e56; cursor: not-allowed; }

    /* Ghost button */
    .btn-ghost {
      background: transparent;
      border: 1px solid #2a2d31;
      color: #7a7f8a;
      font-size: 0.8rem;
      padding: 0.35rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: #e8a435; color: #e8a435; }

    /* Modal backdrop */
    #modal-backdrop {
      backdrop-filter: blur(4px);
      background: rgba(10,10,12,0.75);
    }

    /* Modal slide-in */
    #modal-panel {
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), opacity 0.2s;
    }
    #modal-panel.hidden { transform: translateX(40px); opacity: 0; pointer-events: none; }

    /* Entry animation */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease both; }

    /* Toast */
    #toast {
      transition: opacity 0.25s, transform 0.25s;
    }
    #toast.hide { opacity:0; transform:translateY(8px); pointer-events:none; }

    /* Section label */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a4e56;
    }
  </style>
</head>

<body class="relative z-10">

  <!-- ───────────── TOP BAR ───────────── -->
  <header class="sticky top-0 z-20 border-b border-border bg-ink/90 backdrop-blur-md">
    <div class="max-w-[1400px] mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="font-display text-xl text-bright tracking-tight">Datastraw</span>
        <span class="text-muted text-sm">/</span>
        <span class="font-mono text-xs text-dim">Support CRM</span>
      </div>
      <div class="flex items-center gap-2">
        <span id="header-count" class="font-mono text-xs text-dim px-2 py-1 rounded border border-border bg-card"></span>
        <div class="w-2 h-2 rounded-full bg-teal animate-pulse"></div>
        <span class="text-xs text-dim">Live</span>
      </div>
    </div>
  </header>

  <!-- ───────────── MAIN LAYOUT ───────────── -->
  <main class="max-w-[1400px] mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-[380px_1fr] gap-6">

    <!-- ──── LEFT: CREATE TICKET FORM ──── -->
    <aside class="space-y-0">
      <div class="bg-panel border border-border rounded-xl p-5 sticky top-20">
        <div class="mb-5">
          <p class="section-label mb-1">New ticket</p>
          <h2 class="font-display text-2xl text-bright font-medium">Open a request</h2>
        </div>

        <form id="create-form" class="space-y-3" onsubmit="handleCreateTicket(event)">
          <div>
            <label class="section-label block mb-1.5">Customer name</label>
            <input type="text" id="f-name" class="field" placeholder="Jane Appleseed" required />
          </div>
          <div>
            <label class="section-label block mb-1.5">Email address</label>
            <input type="email" id="f-email" class="field" placeholder="jane@company.com" required />
          </div>
          <div>
            <label class="section-label block mb-1.5">Issue subject</label>
            <input type="text" id="f-subject" class="field" placeholder="Short description of the issue" required />
          </div>
          <div>
            <label class="section-label block mb-1.5">Description</label>
            <textarea id="f-description" class="field" placeholder="Describe the issue in detail…" required></textarea>
          </div>

          <div class="pt-1">
            <button type="submit" class="btn-primary" id="submit-btn">
              <span id="submit-label">Create ticket →</span>
            </button>
          </div>
        </form>

        <!-- quick stats -->
        <div class="mt-6 pt-5 border-t border-border grid grid-cols-3 gap-2 text-center">
          <div>
            <p class="font-mono text-lg text-bright" id="stat-open">—</p>
            <p class="section-label mt-0.5">Open</p>
          </div>
          <div>
            <p class="font-mono text-lg text-amber" id="stat-progress">—</p>
            <p class="section-label mt-0.5">In Progress</p>
          </div>
          <div>
            <p class="font-mono text-lg text-[#8080c0]" id="stat-closed">—</p>
            <p class="section-label mt-0.5">Closed</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- ──── RIGHT: TICKET LIST ──── -->
    <section class="space-y-4">
      <!-- toolbar -->
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-muted" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" class="field pl-9 sm:w-full" placeholder="Search by name, email, ID, subject…" oninput="debounceSearch()" />
        </div>
        <select id="filter-status" class="field sm:w-44" onchange="renderTickets()">
          <option value="">All statuses</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <!-- list -->
      <div id="ticket-list" class="space-y-2">
        <!-- populated by JS -->
      </div>

      <!-- empty state -->
      <div id="empty-state" class="hidden text-center py-20 text-dim fade-up">
        <p class="font-display text-4xl mb-3 text-border">∅</p>
        <p class="text-sm">No tickets found. Try a different search or create one.</p>
      </div>

      <!-- loading skeleton -->
      <div id="loading-state" class="space-y-2">
        <div class="h-16 bg-card border border-border rounded-lg animate-pulse"></div>
        <div class="h-16 bg-card border border-border rounded-lg animate-pulse"></div>
        <div class="h-16 bg-card border border-border rounded-lg animate-pulse"></div>
      </div>
    </section>

  </main>

  <!-- ───────────── DETAIL MODAL ───────────── -->
  <div id="modal-backdrop" class="fixed inset-0 z-30 hidden" onclick="closeModal(event)">
    <div class="absolute inset-y-0 right-0 w-full max-w-xl flex flex-col" id="modal-panel">
      <div class="bg-panel border-l border-border h-full overflow-y-auto flex flex-col" onclick="e=>e.stopPropagation()">

        <!-- modal header -->
        <div class="sticky top-0 bg-panel border-b border-border px-6 py-4 flex items-center justify-between z-10">
          <div>
            <p class="section-label" id="m-ticket-id">—</p>
            <h3 class="font-display text-xl text-bright mt-0.5" id="m-subject">—</h3>
          </div>
          <button onclick="closeModal()" class="btn-ghost text-lg px-3 py-1.5">✕</button>
        </div>

        <!-- modal body -->
        <div class="px-6 py-5 flex-1 space-y-6">

          <!-- customer info -->
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-card border border-border rounded-lg p-4">
              <p class="section-label mb-1">Customer</p>
              <p class="text-bright text-sm font-medium" id="m-name">—</p>
            </div>
            <div class="bg-card border border-border rounded-lg p-4">
              <p class="section-label mb-1">Email</p>
              <p class="text-bright text-sm font-mono truncate" id="m-email">—</p>
            </div>
            <div class="bg-card border border-border rounded-lg p-4">
              <p class="section-label mb-1">Created</p>
              <p class="text-bright text-sm font-mono" id="m-created">—</p>
            </div>
            <div class="bg-card border border-border rounded-lg p-4">
              <p class="section-label mb-1">Updated</p>
              <p class="text-bright text-sm font-mono" id="m-updated">—</p>
            </div>
          </div>

          <!-- description -->
          <div>
            <p class="section-label mb-2">Description</p>
            <div class="bg-card border border-border rounded-lg p-4 text-sm text-body leading-relaxed" id="m-description">—</div>
          </div>

          <!-- update status -->
          <div>
            <p class="section-label mb-2">Update status</p>
            <div class="flex gap-2 flex-wrap">
              <button onclick="updateStatus('Open')"        class="btn-ghost text-xs" id="sbtn-Open">Open</button>
              <button onclick="updateStatus('In Progress')" class="btn-ghost text-xs" id="sbtn-In Progress">In Progress</button>
              <button onclick="updateStatus('Closed')"      class="btn-ghost text-xs" id="sbtn-Closed">Closed</button>
            </div>
          </div>

          <!-- notes -->
          <div>
            <p class="section-label mb-3">Notes & activity</p>
            <div id="m-notes-list" class="space-y-2 mb-4 max-h-64 overflow-y-auto pr-1">
              <!-- populated by JS -->
            </div>
            <div class="flex gap-2">
              <input type="text" id="note-input" class="field flex-1" placeholder="Add a note…" onkeydown="if(event.key==='Enter')addNote()" />
              <button onclick="addNote()" class="btn-ghost text-sm px-4">Add</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- ───────────── TOAST ───────────── -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hide">
    <div class="bg-card border border-border rounded-lg px-5 py-3 text-sm text-bright shadow-xl flex items-center gap-2.5">
      <span id="toast-icon" class="text-teal">✓</span>
      <span id="toast-msg"></span>
    </div>
  </div>

  <!-- ───────────── JAVASCRIPT ───────────── -->
  <script>
    // ─── Config ───────────────────────────────────────────────────────────
    const API = 'http://127.0.0.1:8000'; // change to your deployed URL

    let allTickets   = [];
    let activeId     = null;
    let searchTimer  = null;

    // ─── Boot ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadTickets();
    });

    // ─── Fetch all tickets ────────────────────────────────────────────────
    async function loadTickets() {
      showLoading(true);
      try {
        const res = await fetch(`${API}/api/tickets`);
        if (!res.ok) throw new Error('Network response was not ok');
        allTickets = await res.json();
        renderTickets();
        updateStats();
      } catch (err) {
        showToast('Could not reach the API. Is the server running?', true);
      } finally {
        showLoading(false);
      }
    }

    // ─── Render ticket list ────────────────────────────────────────────────
    function renderTickets() {
      const search = document.getElementById('search-input').value.trim().toLowerCase();
      const status = document.getElementById('filter-status').value;

      let filtered = allTickets.filter(t => {
        const matchStatus = !status || t.status === status;
        const matchSearch = !search ||
          t.ticket_id.toLowerCase().includes(search) ||
          t.customer_name.toLowerCase().includes(search) ||
          t.subject.toLowerCase().includes(search);
        return matchStatus && matchSearch;
      });

      const list = document.getElementById('ticket-list');
      const empty = document.getElementById('empty-state');

      document.getElementById('header-count').textContent =
        `${filtered.length} ticket${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = filtered.map((t, i) => `
        <div class="ticket-row border border-border rounded-xl px-5 py-4 fade-up flex items-center gap-4 ${activeId === t.ticket_id ? 'active' : ''}"
             style="animation-delay:${i * 0.04}s"
             onclick="openModal('${t.ticket_id}')">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-mono text-xs text-dim">${t.ticket_id}</span>
              <span class="pill-${t.status.replace(' ', '_').toLowerCase()} text-xs font-mono px-2 py-0.5 rounded-full">${t.status}</span>
            </div>
            <p class="text-bright text-sm font-medium truncate">${escHtml(t.subject)}</p>
            <p class="text-dim text-xs mt-0.5 truncate">${escHtml(t.customer_name)}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-mono text-xs text-muted">${fmtDate(t.created_at)}</p>
          </div>
        </div>
      `).join('');
    }

    // ─── Create ticket ─────────────────────────────────────────────────────
    async function handleCreateTicket(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const lbl = document.getElementById('submit-label');
      btn.disabled = true;
      lbl.textContent = 'Creating…';

      const body = {
        customer_name:  document.getElementById('f-name').value.trim(),
        customer_email: document.getElementById('f-email').value.trim(),
        subject:        document.getElementById('f-subject').value.trim(),
        description:    document.getElementById('f-description').value.trim(),
      };

      try {
        const res = await fetch(`${API}/api/tickets`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Failed to create ticket');
        }
        const data = await res.json();
        showToast(`Ticket ${data.ticket_id} created successfully`);
        document.getElementById('create-form').reset();
        await loadTickets();
      } catch (err) {
        showToast(err.message || 'Something went wrong', true);
      } finally {
        btn.disabled = false;
        lbl.textContent = 'Create ticket →';
      }
    }

    // ─── Open modal ────────────────────────────────────────────────────────
    async function openModal(ticketId) {
      activeId = ticketId;
      renderTickets(); // refresh active state

      const backdrop = document.getElementById('modal-backdrop');
      const panel    = document.getElementById('modal-panel');

      backdrop.classList.remove('hidden');
      setTimeout(() => panel.classList.remove('hidden'), 10);

      try {
        const res = await fetch(`${API}/api/tickets/${ticketId}`);
        if (!res.ok) throw new Error('Ticket not found');
        const t = await res.json();
        populateModal(t);
      } catch (err) {
        showToast('Could not load ticket details', true);
        closeModal();
      }
    }

    function populateModal(t) {
      document.getElementById('m-ticket-id').textContent   = t.ticket_id;
      document.getElementById('m-subject').textContent     = t.subject;
      document.getElementById('m-name').textContent        = t.customer_name;
      document.getElementById('m-email').textContent       = t.customer_email;
      document.getElementById('m-description').textContent = t.description;
      document.getElementById('m-created').textContent     = fmtDate(t.created_at);
      document.getElementById('m-updated').textContent     = fmtDate(t.updated_at);

      // highlight active status button
      ['Open', 'In Progress', 'Closed'].forEach(s => {
        const btn = document.getElementById(`sbtn-${s}`);
        if (s === t.status) {
          btn.style.borderColor = '#e8a435';
          btn.style.color = '#e8a435';
        } else {
          btn.style.borderColor = '';
          btn.style.color = '';
        }
      });

      // render notes
      renderNotes(t.notes || []);
    }

    function renderNotes(notes) {
      const container = document.getElementById('m-notes-list');
      if (!notes.length) {
        container.innerHTML = '<p class="text-dim text-xs italic">No notes yet.</p>';
        return;
      }
      container.innerHTML = notes.map(n => `
        <div class="bg-card border border-border rounded-lg px-3.5 py-2.5">
          <p class="text-body text-sm leading-relaxed">${escHtml(n.note_text)}</p>
          <p class="font-mono text-xs text-muted mt-1">${fmtDate(n.created_at)}</p>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    // ─── Update status ─────────────────────────────────────────────────────
    async function updateStatus(newStatus) {
      if (!activeId) return;
      try {
        const res = await fetch(`${API}/api/tickets/${activeId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        if (!res.ok) throw new Error('Update failed');
        showToast(`Status updated to "${newStatus}"`);
        await loadTickets();
        // refresh modal content
        const detailRes = await fetch(`${API}/api/tickets/${activeId}`);
        populateModal(await detailRes.json());
      } catch (err) {
        showToast(err.message, true);
      }
    }

    // ─── Add note ──────────────────────────────────────────────────────────
    async function addNote() {
      const input = document.getElementById('note-input');
      const text  = input.value.trim();
      if (!text || !activeId) return;

      try {
        const res = await fetch(`${API}/api/tickets/${activeId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note: text }),
        });
        if (!res.ok) throw new Error('Could not add note');
        input.value = '';
        showToast('Note added');
        const detailRes = await fetch(`${API}/api/tickets/${activeId}`);
        const t = await detailRes.json();
        renderNotes(t.notes || []);
      } catch (err) {
        showToast(err.message, true);
      }
    }

    // ─── Close modal ───────────────────────────────────────────────────────
    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-backdrop')) return;
      activeId = null;
      document.getElementById('modal-panel').classList.add('hidden');
      document.getElementById('modal-backdrop').classList.add('hidden');
      renderTickets();
    }

    // ─── Stats ─────────────────────────────────────────────────────────────
    function updateStats() {
      document.getElementById('stat-open').textContent     = allTickets.filter(t => t.status === 'Open').length;
      document.getElementById('stat-progress').textContent = allTickets.filter(t => t.status === 'In Progress').length;
      document.getElementById('stat-closed').textContent   = allTickets.filter(t => t.status === 'Closed').length;
    }

    // ─── Search debounce ──────────────────────────────────────────────────
    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderTickets, 200);
    }

    // ─── Toast ────────────────────────────────────────────────────────────
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      const icon  = document.getElementById('toast-icon');
      document.getElementById('toast-msg').textContent = msg;
      icon.textContent = isError ? '✕' : '✓';
      icon.className   = isError ? 'text-rose' : 'text-teal';
      toast.classList.remove('hide');
      setTimeout(() => toast.classList.add('hide'), 3000);
    }

    // ─── Loading ──────────────────────────────────────────────────────────
    function showLoading(show) {
      document.getElementById('loading-state').style.display = show ? 'block' : 'none';
    }

    // ─── Helpers ──────────────────────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) +
             ' · ' +
             d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
